name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Verify tag matches project version
        shell: pwsh
        run: |
          [xml]$project = Get-Content AgentCompanion.csproj
          $version = [string]$project.Project.PropertyGroup.VersionPrefix
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match project version v$version."
          }

      - name: Restore
        run: dotnet restore AgentCompanion.sln --locked-mode

      - name: Verify formatting
        run: dotnet format AgentCompanion.sln --verify-no-changes --no-restore

      - name: Verify text encoding
        shell: pwsh
        run: ./tools/Test-TextEncoding.ps1

      - name: Verify documentation assets
        shell: pwsh
        run: ./tools/Test-DocumentationAssets.ps1

      - name: Build
        run: dotnet build AgentCompanion.sln -c Release --no-restore

      - name: Test
        run: dotnet test AgentCompanion.Tests/AgentCompanion.Tests.csproj -c Release --no-build --no-restore

      - name: Audit NuGet packages
        run: dotnet list AgentCompanion.csproj package --vulnerable --include-transitive

      - name: Publish
        run: dotnet publish AgentCompanion.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish/AgentCompanion

      - name: Package release
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $archive = "AgentCompanion-$tag-win-x64.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path "publish/AgentCompanion/*" -DestinationPath "dist/$archive"
          $hash = (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash
          "$hash *$archive" | Set-Content "dist/SHA256SUMS.txt" -Encoding ascii

          $version = $tag.TrimStart("v")
          $lines = Get-Content CHANGELOG.md
          $start = -1
          $end = $lines.Count
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## $([regex]::Escape($version))\s+-") {
              $start = $i
              continue
            }
            if ($start -ge 0 -and $lines[$i] -match "^## ") {
              $end = $i
              break
            }
          }
          if ($start -lt 0) {
            throw "CHANGELOG entry for $version was not found."
          }
          $lines[($start + 1)..($end - 1)] |
            Set-Content "dist/release-notes.md" -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create $tag `
            "dist/AgentCompanion-$tag-win-x64.zip" `
            "dist/SHA256SUMS.txt" `
            --verify-tag `
            --title "AgentCompanion $tag" `
            --notes-file "dist/release-notes.md"
