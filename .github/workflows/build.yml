name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AgentCompanion.sln --locked-mode

      - name: Verify formatting
        run: dotnet format AgentCompanion.sln --verify-no-changes --no-restore

      - name: Verify text encoding
        shell: pwsh
        run: ./tools/Test-TextEncoding.ps1

      - name: Verify documentation assets
        shell: pwsh
        run: ./tools/Test-DocumentationAssets.ps1

      - name: Build
        run: dotnet build AgentCompanion.sln -c Release --no-restore

      - name: Verify Windows DPI manifest
        shell: pwsh
        run: |
          $exe = "bin/Release/net8.0-windows/win-x64/AgentCompanion.exe"
          $content = [Text.Encoding]::UTF8.GetString([IO.File]::ReadAllBytes($exe))
          if (-not $content.Contains("PerMonitorV2")) { throw "PerMonitorV2 is missing from $exe" }

      - name: Test
        run: dotnet test AgentCompanion.Tests/AgentCompanion.Tests.csproj -c Release --no-build --no-restore --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Enforce coverage baseline
        shell: pwsh
        run: |
          $report = Get-ChildItem TestResults -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $report) { throw "Coverage report was not generated." }
          [xml]$coverage = Get-Content $report.FullName
          $rate = [double]::Parse($coverage.coverage.'line-rate', [Globalization.CultureInfo]::InvariantCulture)
          if ($rate -lt 0.15) { throw "Line coverage $($rate * 100)% is below the 15% baseline." }
      - name: Audit NuGet packages
        run: dotnet list AgentCompanion.csproj package --vulnerable --include-transitive

      - name: Publish
        run: dotnet publish AgentCompanion.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish/AgentCompanion

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: AgentCompanion-win-x64
          path: publish/AgentCompanion
          if-no-files-found: error
          retention-days: 14
