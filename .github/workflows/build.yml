name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AgentPet.sln --locked-mode

      - name: Verify formatting
        run: dotnet format AgentPet.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build AgentPet.sln -c Release --no-restore

      - name: Test
        run: dotnet test AgentPet.Tests/AgentPet.Tests.csproj -c Release --no-build --no-restore --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Enforce coverage baseline
        shell: pwsh
        run: |
          $report = Get-ChildItem TestResults -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $report) { throw "Coverage report was not generated." }
          [xml]$coverage = Get-Content $report.FullName
          $rate = [double]::Parse($coverage.coverage.'line-rate', [Globalization.CultureInfo]::InvariantCulture)
          if ($rate -lt 0.15) { throw "Line coverage $($rate * 100)% is below the 15% baseline." }
      - name: Audit NuGet packages
        run: dotnet list AgentPet.csproj package --vulnerable --include-transitive

      - name: Publish
        run: dotnet publish AgentPet.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish/AgentPet

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: AgentPet-win-x64
          path: publish/AgentPet
          if-no-files-found: error
          retention-days: 14
