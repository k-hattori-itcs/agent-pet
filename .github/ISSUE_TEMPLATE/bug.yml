name: Bug report
description: Report a reproducible AgentPet problem
title: "bug: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Provide minimal steps. Remove credentials, transcripts, and local personal paths.
    validations:
      required: true
  - type: input
    attributes:
      label: AgentPet version
    validations:
      required: true
  - type: input
    attributes:
      label: Windows version
    validations:
      required: true
